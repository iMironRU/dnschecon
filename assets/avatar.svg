<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Avatar border shadow -->
  <circle cx="256" cy="256" r="254" fill="#0d1820"/>
  <!-- Background -->
  <circle cx="256" cy="256" r="246" fill="#17212b"/>

  <!-- Outer propagation ring -->
  <circle cx="256" cy="256" r="212" fill="none" stroke="#5288c1" stroke-width="14" opacity="0.35"/>

  <!-- Globe outer circle -->
  <circle cx="256" cy="256" r="145" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.45"/>
  <!-- Equator -->
  <line x1="111" y1="256" x2="401" y2="256" stroke="#ffffff" stroke-width="8" opacity="0.28"/>
  <!-- Upper latitude -->
  <ellipse cx="256" cy="205" rx="122" ry="38" fill="none" stroke="#ffffff" stroke-width="7" opacity="0.22"/>
  <!-- Lower latitude -->
  <ellipse cx="256" cy="307" rx="122" ry="38" fill="none" stroke="#ffffff" stroke-width="7" opacity="0.22"/>
  <!-- Central meridian -->
  <ellipse cx="256" cy="256" rx="66" ry="145" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.28"/>

  <!-- Dark backdrop behind DNS text -->
  <ellipse cx="256" cy="256" rx="93" ry="55" fill="#17212b" opacity="0.55"/>

  <!-- DNS text -->
  <text x="256" y="256"
    text-anchor="middle" dominant-baseline="central"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="104" font-weight="800" letter-spacing="-4"
    fill="#ffffff">DNS</text>

  <!-- Green live indicator -->
  <circle cx="328" cy="172" r="34" fill="#17212b"/>
  <circle cx="328" cy="172" r="24" fill="#4cd964"/>

</svg>
